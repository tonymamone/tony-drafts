<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello, World!</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000000;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: bold;
      color: #0171e4;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-size: 64px;
      font-weight: bold;
      text-align: center;
      padding-top: 30px;
      padding-bottom: 30px;
    }

    .gif-container {
      display: flex;
      justify-content: center;
    }

    .gif-container img {
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <h1>Hello, World!</h1>
  <div class="gif-container">
    <img src="https://charlesesmediablog.home.blog/wp-content/uploads/2020/02/bouncing-ball.gif" alt="Bouncing Ball">
  </div>
</body>
</html>
